version: '3.8'

services:
  # 1. MediaMTX 流媒体服务器
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx_server
    restart: always
    ports:
      - "8554:8554"   # RTSP 推流/拉流端口
      - "1935:1935"   # RTMP 推流/拉流端口
      - "8888:8888"   # HLS 播放端口 (M3U8)
      - "8889:8889"   # WebRTC 播放端口 (WHEP)
      - "9997:9997"   # Control API 管理端口
    environment:
      # 通过环境变量直接开启 API 和 自动录制（可选，用于测试教学回放）
      - MTX_API=yes
      - MTX_APIADDRESS=0.0.0.0:9997
      - MTX_APIUSER=admin      # 自定义你的 API 用户名
      - MTX_APIPASS=123 # 自定义你的 API 密码
    volumes:
      # 挂载一个目录用来保存自动录制的视频文件
      - ./recordings:/mediamtx_recordings

  # 2. 模拟内镜视频输出端 (FFmpeg 自动循环推流)
  video-publisher:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: ffmpeg_publisher
    restart: always
    depends_on:
      - mediamtx
    volumes:
      # 把本地的测试视频挂载进容器
      - "D:\\1\\CO.mp4:/tmp/sample.mp4"
    # 使用 FFmpeg 命令：-re(按原生帧率) -stream_loop -1(无限循环) -i(输入源)
    # 将视频编码为 H.264，音频编码为 AAC，以 RTSP 协议推送到 mediamtx 容器的 /live/endo 路径下
    command: >
      -re -stream_loop -1 
      -i /tmp/sample.mp4 
      -c:v libx264 -preset superfast -tune zerolatency 
      -c:a aac 
      -f rtsp -rtsp_transport tcp 
      rtsp://mediamtx:8554/live/endo